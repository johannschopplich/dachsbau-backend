title: Startseite

icon: 🏠

options:
  changeStatus: false
  delete: false
  preview: "{{ page.frontendUrl }}"

tabs:
  content:
    label: Inhalt
    icon: draft
    sections:
      main:
        type: fields
        fields:
          intro:
            label: Intro
            type: text
          heroImage:
            label: Einstiegsbild
            type: files
            multiple: false
            query: page.files.template("image")
            uploads:
              template: image
          contact:
            label: Kontakt
            type: writer
            inline: true

  seo:
    label: SEO
    icon: search
    sections:
      meta: sections/meta

  images: tabs/images
